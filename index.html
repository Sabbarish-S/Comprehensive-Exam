<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comprehensive Exam 640 Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090d;--surface:#0f1117;--card:#141820;--border:#1d2535;
  --accent:#4f9cf9;--accent2:#f97316;--accent3:#22d3ae;--accent4:#a78bfa;
  --text:#dde4f0;--muted:#5c6a82;--correct:#22c55e;--wrong:#ef4444;
  --fm:'Space Mono',monospace;--fs:'Sora',sans-serif;
  --sidebar-w:260px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fs);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 45% at 15% 0%,rgba(79,156,249,.055) 0%,transparent 70%),
             radial-gradient(ellipse 50% 35% at 85% 100%,rgba(167,139,250,.04) 0%,transparent 70%);
  pointer-events:none;z-index:0}

/* ── HEADER ── */
header{
  height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);position:sticky;top:0;
  background:rgba(8,9,13,.92);backdrop-filter:blur(18px);z-index:200;
}
.logo{font-family:var(--fm);font-size:.95rem;color:var(--accent);letter-spacing:.08em;display:flex;align-items:center;gap:10px}
.logo span{color:var(--accent2)}
.logo-badge{
  font-size:.6rem;background:linear-gradient(135deg,var(--accent),var(--accent3));
  color:#fff;padding:2px 7px;border-radius:20px;letter-spacing:.04em;font-weight:700
}
.hstats{display:flex;gap:14px;align-items:center}
.hstat{font-family:var(--fm);font-size:.68rem;color:var(--muted)}
.hstat strong{color:var(--text);font-weight:700}
.hstat.gc strong{color:var(--correct)}.hstat.rw strong{color:var(--wrong)}
.hmenu{display:none;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:4px;line-height:1}

/* ── LAYOUT ── */
.app{display:flex;height:calc(100vh - 56px);position:relative}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:150;
}
.sb-head{padding:16px 18px 8px;font-family:var(--fm);font-size:.62rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.sbj{
  width:100%;text-align:left;padding:10px 18px 14px;background:none;border:none;
  color:var(--muted);font-family:var(--fs);font-size:.84rem;cursor:pointer;
  display:flex;align-items:center;gap:9px;
  border-left:3px solid transparent;transition:all .15s;position:relative;
}
.sbj:hover{background:var(--card);color:var(--text)}
.sbj.active{background:var(--card);color:var(--accent);border-left-color:var(--accent)}
.sbj .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sbj .lbl{flex:1;text-align:left}
.sbj .cnt{font-family:var(--fm);font-size:.65rem;background:var(--border);padding:2px 7px;border-radius:20px;color:var(--muted)}
.sbj.active .cnt{background:rgba(79,156,249,.18);color:var(--accent)}
.sbj-bar{position:absolute;bottom:4px;left:21px;right:18px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.sbj-bar-fill{height:100%;border-radius:2px;transition:width .5s}

.sb-foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border)}
.sb-foot-title{font-family:var(--fm);font-size:.62rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.mode-row{display:flex;gap:6px;margin-bottom:10px}
.mbtn{
  flex:1;padding:8px 4px;background:var(--card);border:1px solid var(--border);
  color:var(--muted);font-family:var(--fm);font-size:.68rem;border-radius:6px;
  cursor:pointer;transition:all .15s;letter-spacing:.05em
}
.mbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.rst-btn{
  width:100%;padding:7px;background:none;border:1px solid var(--border);
  color:var(--muted);font-family:var(--fm);font-size:.63rem;border-radius:6px;
  cursor:pointer;transition:all .15s;letter-spacing:.05em
}
.rst-btn:hover{border-color:var(--wrong);color:var(--wrong)}

/* Mobile sidebar overlay */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:149}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:24px 28px;position:relative;z-index:1}

/* ── SUBJECT HEADER ── */
.sh{margin-bottom:20px;display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
.sh-name{font-family:var(--fm);font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
.sh-prog{flex:1;min-width:200px;max-width:280px}
.sh-lbl{font-size:.7rem;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px}
.sh-track{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.sh-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .4s}

/* ── CONTROLS ── */
.ctrl{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.search{
  flex:1;min-width:180px;max-width:340px;
  background:var(--card);border:1px solid var(--border);
  color:var(--text);font-family:var(--fs);font-size:.84rem;
  padding:8px 13px;border-radius:8px;outline:none;transition:border-color .15s
}
.search::placeholder{color:var(--muted)}.search:focus{border-color:var(--accent)}
.fbtn{
  padding:6px 12px;background:var(--card);border:1px solid var(--border);
  color:var(--muted);font-family:var(--fm);font-size:.66rem;
  border-radius:20px;cursor:pointer;transition:all .15s;letter-spacing:.05em;white-space:nowrap
}
.fbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.fbtn.wf.on{background:var(--wrong);border-color:var(--wrong)}
.shuf{
  margin-left:auto;padding:6px 12px;background:var(--card);
  border:1px solid var(--border);color:var(--muted);
  font-family:var(--fm);font-size:.66rem;border-radius:20px;cursor:pointer;
  transition:all .15s;white-space:nowrap
}
.shuf:hover{border-color:var(--accent3);color:var(--accent3)}

/* ── QUESTION CARD ── */
.qcard{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:20px;margin-bottom:12px;transition:border-color .2s;
  animation:cin .2s ease both
}
@keyframes cin{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.qcard:hover{border-color:#252e42}
.qcard.ac{border-color:rgba(34,197,94,.3)}.qcard.aw{border-color:rgba(239,68,68,.22)}

.qh{display:flex;align-items:flex-start;gap:11px;margin-bottom:15px}
.qn{font-family:var(--fm);font-size:.65rem;color:var(--muted);background:var(--border);padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:2px}
.qt{font-size:.91rem;line-height:1.65;color:var(--text)}

.opts{display:grid;gap:7px}
.opt{
  width:100%;text-align:left;padding:10px 14px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:var(--fs);font-size:.84rem;
  border-radius:8px;cursor:pointer;transition:all .13s;
  display:flex;gap:9px;align-items:flex-start
}
.opt:hover:not(:disabled){background:var(--card);border-color:var(--accent);color:var(--accent)}
.opt .ol{font-family:var(--fm);font-size:.65rem;font-weight:700;color:var(--muted);min-width:17px;margin-top:1px;flex-shrink:0}
.opt:hover:not(:disabled) .ol{color:var(--accent)}
.opt.sc{background:rgba(34,197,94,.1);border-color:var(--correct);color:var(--correct)}
.opt.sc .ol{color:var(--correct)}
.opt.sw{background:rgba(239,68,68,.1);border-color:var(--wrong);color:var(--wrong)}
.opt.sw .ol{color:var(--wrong)}
.opt.rc{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.35);color:rgba(34,197,94,.8)}
.opt:disabled{cursor:default}

.exp{
  margin-top:11px;padding:11px 14px;
  background:rgba(79,156,249,.07);border:1px solid rgba(79,156,249,.18);
  border-radius:8px;font-size:.8rem;line-height:1.6;color:var(--muted);
  animation:cin .3s ease
}
.exp strong{color:var(--accent);font-weight:600}
.qf{margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.qico{font-size:.95rem}
.sabtn{
  background:none;border:1px solid var(--border);color:var(--muted);
  font-family:var(--fm);font-size:.65rem;padding:4px 10px;border-radius:6px;
  cursor:pointer;transition:all .15s;letter-spacing:.05em
}
.sabtn:hover{border-color:var(--accent);color:var(--accent)}

/* ── PAGINATION ── */
.pager{
  display:flex;justify-content:center;align-items:center;
  gap:10px;padding:20px 0 4px;
  font-family:var(--fm);font-size:.72rem;color:var(--muted)
}
.pgbtn{
  padding:7px 16px;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-family:var(--fm);font-size:.7rem;border-radius:7px;cursor:pointer;transition:all .15s
}
.pgbtn:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent)}
.pgbtn:disabled{opacity:.35;cursor:default}
.pginfo{min-width:90px;text-align:center}

/* ── FLASH MODE ── */
.flash-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 40px}
.fc-prog{width:100%;max-width:620px;margin-bottom:18px}
.fc-pl{font-size:.7rem;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px}
.fc-pt{height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.fc-pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .3s}

.fc{width:100%;max-width:620px;perspective:1200px;cursor:pointer;margin-bottom:22px}
.fc-inner{
  width:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;position:relative;min-height:240px
}
.fc.flip .fc-inner{transform:rotateY(180deg)}
.fc-face{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:36px 32px;min-height:240px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  position:absolute;width:100%;top:0;left:0
}
.fc-back{transform:rotateY(180deg);background:var(--surface);border-color:rgba(79,156,249,.25)}
.fc-front{position:relative}
.fc-lbl{font-family:var(--fm);font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.fc-q{font-size:.98rem;line-height:1.65;color:var(--text)}
.fc-a{font-size:.95rem;line-height:1.6;color:var(--correct);font-weight:600;margin-bottom:8px}
.fc-exp{font-size:.76rem;color:var(--muted);line-height:1.5;margin-top:8px}
.fc-tip{font-size:.75rem;color:var(--muted);margin-top:14px}

.fc-nav{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.fcnbtn{
  padding:9px 22px;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-family:var(--fm);font-size:.76rem;border-radius:8px;cursor:pointer;transition:all .15s
}
.fcnbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.fc-ctr{font-family:var(--fm);font-size:.8rem;color:var(--muted);min-width:80px;text-align:center}
.fc-keys{font-family:var(--fm);font-size:.66rem;color:var(--muted)}

/* ── EMPTY ── */
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty .ico{font-size:2rem;margin-bottom:10px}
.empty p{font-size:.86rem}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .hmenu{display:block}
  .hstats .hstat:nth-child(n+3){display:none}
  .sidebar{
    position:fixed;top:56px;left:0;bottom:0;
    transform:translateX(-100%);
  }
  .sidebar.open{transform:translateX(0)}
  .sb-overlay{display:none}
  .sb-overlay.show{display:block}
  .main{padding:16px}
  .sh-name{font-size:1.1rem}
  .ctrl{gap:5px}
  .search{min-width:140px}
  .shuf{margin-left:0}
}
@media(max-width:480px){
  .hstats{display:none}
  .fc-face{padding:24px 20px}
  .fc-q{font-size:.88rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    Compehensive <span>Exam</span>
    <span class="logo-badge">640 Q</span>
  </div>
  <div class="hstats">
    <div class="hstat">Total <strong id="stT">0</strong></div>
    <div class="hstat gc">✓ <strong id="stC">0</strong></div>
    <div class="hstat rw">✗ <strong id="stW">0</strong></div>
    <div class="hstat">Score <strong id="stS">—</strong></div>
  </div>
  <button class="hmenu" id="menuBtn" onclick="toggleSidebar()" aria-label="Menu">☰</button>
</header>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-head">Subjects</div>
    <div id="sbjList"></div>
    <div class="sb-foot">
      <div class="sb-foot-title">Study Mode</div>
      <div class="mode-row">
        <button class="mbtn active" id="mqz" onclick="setMode('quiz')">QUIZ</button>
        <button class="mbtn" id="mfl" onclick="setMode('flash')">FLASH</button>
      </div>
      <button class="rst-btn" onclick="resetSubject()">↺ Reset This Subject</button>
      <div class="sb-foot-title">Study Mode</div>
    </div>
  </div>
  <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
  <div class="main" id="main"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const subjects = {
  "Computer Networks": {
    color: "#4f9cf9",
    questions: [
      {q:"What is the main purpose of public key cryptography?",opts:["Encryption","Authentication","Key exchange","All of the above"],ans:3,exp:"Public key cryptography serves all three: encryption, authentication, and key exchange. [cite: 1062]"},
      {q:"Which algorithm is used for creating and verifying digital signatures?",opts:["RSA","AES","DES","SHA"],ans:0,exp:"RSA is the most common algorithm for digital signatures. [cite: 1063]"},
      {q:"What is authentication in cryptography?",opts:["The process of encrypting a message","The process of verifying the identity of a user","The process of generating a digital signature","The process of decrypting a message"],ans:1,exp:"Authentication verifies the identity of a communicating party. [cite: 1064]"},
      {q:"Which is an example of 'something you know' for authentication?",opts:["Password","Fingerprint","Smart card","All of the above"],ans:0,exp:"A password is the classic 'something you know' authentication factor. [cite: 1065]"},
      {q:"Which type of authentication uses multiple factors?",opts:["Single-factor","Two-factor","Three-factor","Multi-factor"],ans:3,exp:"Multi-factor authentication (MFA) uses more than one factor. [cite: 1066]"},
      {q:"Which type of authentication uses a password and a security token?",opts:["Single-factor","Two-factor","Three-factor","Multi-factor"],ans:1,exp:"Password (something you know) + token (something you have) = Two-factor. [cite: 1067]"},
      {q:"Which type of authentication uses biometric data?",opts:["Single-factor","Two-factor","Three-factor","Multi-factor"],ans:0,exp:"Biometric alone = single factor (something you are). [cite: 1068]"},
      {q:"Which type of authentication uses a smart card and a PIN?",opts:["Single-factor","Two-factor","Three-factor","Multi-factor"],ans:1,exp:"Card (something you have) + PIN (something you know) = Two-factor. [cite: 1069]"},
      {q:"Which attack involves guessing passwords until the correct one is found?",opts:["Brute force attack","Dictionary attack","Social engineering attack","Man-in-the-middle attack"],ans:0,exp:"Brute force systematically tries all possible combinations. [cite: 1070]"},
      {q:"Which attack uses pre-computed hashes to guess passwords?",opts:["Brute force attack","Dictionary attack","Rainbow table attack","Man-in-the-middle attack"],ans:2,exp:"Rainbow table attacks use precomputed hash tables for fast lookups. [cite: 1071]"},
      {q:"Which attack involves tricking someone into revealing their password?",opts:["Brute force attack","Dictionary attack","Social engineering attack","Man-in-the-middle attack"],ans:2,exp:"Social engineering exploits human psychology. [cite: 1072]"},
      {q:"Which key is used for encryption in a public key cryptosystem?",opts:["Public key","Private key","Symmetric key","None of the above"],ans:0,exp:"The public key encrypts; private key decrypts. [cite: 1073]"},
      {q:"Which attack intercepts and modifies communication between two parties?",opts:["Brute force","Dictionary","Social engineering","Man-in-the-middle"],ans:3,exp:"MITM attacks intercept and potentially alter communications. [cite: 1074]"},
      {q:"Which encryption algorithm uses the same key for encryption and decryption?",opts:["Public key","Private key","Symmetric key","Asymmetric key"],ans:2,exp:"Symmetric encryption uses one shared secret key. [cite: 1075]"},
      {q:"Which encryption algorithm uses different keys for encryption and decryption?",opts:["Public key","Private key","Symmetric key","Asymmetric key"],ans:3,exp:"Asymmetric (public-key) cryptography uses a key pair. [cite: 1076]"},
      {q:"Which type of encryption algorithm is faster?",opts:["Public key","Private key","Symmetric key","Asymmetric key"],ans:2,exp:"Symmetric algorithms are much faster due to simpler operations. [cite: 1077]"},
      {q:"Which type of encryption algorithm is more secure?",opts:["Public key","Private key","Symmetric key","Asymmetric key"],ans:3,exp:"Asymmetric encryption is generally considered more secure. [cite: 1078]"},
      {q:"Which protocol is used for secure communication over the internet?",opts:["TLS/SSL","HTTPS","SSH","TCP/IP"],ans:1,exp:"HTTPS is HTTP secured over TLS/SSL. [cite: 1079]"},
      {q:"Which protocol is used for secure remote login over an insecure network?",opts:["TLS/SSL","HTTPS","SSH","TCP/IP"],ans:2,exp:"SSH (Secure Shell) provides encrypted remote login. [cite: 1080]"},
      {q:"Anarkali digitally signs a message. Verification by Salim requires:",opts:["Anarkali's Public Key","Salim's Public Key","Salim's Private Key","Anarkali's Private Key"],ans:0,exp:"You verify a digital signature using the SIGNER's public key. [cite: 1082]"},
      {q:"Sender S sends message m to R digitally signed by S. Which violations are possible?",opts:["(I) and (II) only","(I) only","(II) only","(II) and (III) only"],ans:0,exp:"Digital signatures prevent some but not all security violations. [cite: 1083]"},
      {q:"AES uses a ___ bit block size and key size of ___ bits.",opts:["128; 128 or 256","64; 128 or 192","256; 128, 192, or 256","128; 128, 192, or 256"],ans:3,exp:"AES always has 128-bit blocks and supports 128, 192, or 256-bit keys. [cite: 1084, 1085]"},
      {q:"Which key is kept secret in a public key cryptosystem?",opts:["Public key","Private key","Symmetric key","None"],ans:1,exp:"The private key must never be shared. [cite: 1086]"},
      {q:"How many rounds does AES-256 perform?",opts:["10","12","14","16"],ans:2,exp:"AES-128=10, AES-192=12, AES-256=14 rounds. [cite: 1087]"},
      {q:"What is the key size in the S-AES algorithm?",opts:["16 bits","32 bits","24 bits","None"],ans:0,exp:"Simplified AES (S-AES) uses a 16-bit key. [cite: 1088]"},
      {q:"Dynamic packet filters (4th-gen firewalls) work at:",opts:["Application Layer","TCP","UDP","TCP, UDP"],ans:3,exp:"Dynamic packet filters operate at both TCP and UDP transport layer. [cite: 1089]"},
      {q:"Authentication and Access control are provided by Network Security:",opts:["True","False"],ans:0,exp:"Network security provides both authentication and access control. [cite: 1090]"},
      {q:"________ is the process of verifying the identity of a user.",opts:["Authentication","Identification","Validation","Verification"],ans:0,exp:"Authentication = verifying identity of a user. [cite: 1091]"},
      {q:"A digital signature needs a:",opts:["Private-key system","Shared-key system","Public-key system","All of them"],ans:2,exp:"Digital signatures require asymmetric (public-key) cryptography. [cite: 1092]"},
      {q:"Encryption and decryption provide confidentiality but NOT:",opts:["Authentication","Integrity","Privacy","All"],ans:0,exp:"Encryption alone does NOT provide authentication. [cite: 1093]"},
      {q:"Decrypt HQFUBSWHG WHAW using Caesar Cipher (shift 3):",opts:["ABANDONED LOCK","ENCRYPTED TEXT","ABANDONED TEXT","ENCRYPTED LOCK"],ans:1,exp:"Caesar Cipher shift −3: HQFUBSWHG WHAW → ENCRYPTED TEXT. [cite: 1095]"},
      {q:"A ___ signature is included in the document; a ___ signature is a separate entity.",opts:["conventional; digital","digital; digital","either (a) or (b)","neither (a) or (b)"],ans:0,exp:"Conventional signatures are embedded; digital signatures are separate files. [cite: 1097]"},
      {q:"Digital signature provides:",opts:["Authentication","Non-repudiation","Both (a) and (b)","Neither"],ans:2,exp:"Digital signatures provide both authentication and non-repudiation. [cite: 1100]"},
      {q:"Which algorithm is used for generating public and private keys?",opts:["RSA","AES","DES","SHA"],ans:0,exp:"RSA is the standard algorithm for generating public/private key pairs. [cite: 1102]"},
      {q:"Digital signature CANNOT provide ___ for the message:",opts:["Integrity","Confidentiality","Non-repudiation","Authentication"],ans:1,exp:"Digital signatures don't encrypt — they don't provide confidentiality. [cite: 1104]"},
      {q:"If ___ is needed, a cryptosystem must be applied over the scheme.",opts:["Integrity","Confidentiality","Non-repudiation","Authentication"],ans:1,exp:"For confidentiality, the message itself must be encrypted. [cite: 1106]"},
      {q:"When two members contact KDC, the secret key created is a ___ key.",opts:["Public","Session","Complimentary","None"],ans:1,exp:"KDC creates a temporary session key for each communication. [cite: 1108]"},
      {q:"___ requires an authentication server and a ticket-granting server.",opts:["KDC","Kerberos","CA","None"],ans:1,exp:"Kerberos uses AS (Authentication Server) and TGS (Ticket-Granting Server). [cite: 1110]"},
      {q:"CHAP stands for:",opts:["Challenge Handshake Authentication Protocol","Challenge Hardware Authentication Protocol","Circuit Hardware Authentication Protocol","Circuit Handshake Authentication Protocol"],ans:0,exp:"CHAP = Challenge Handshake Authentication Protocol. [cite: 1112]"},
      {q:"SSL provides:",opts:["Message integrity","Confidentiality","Both A and B","None"],ans:2,exp:"SSL/TLS provides both integrity and confidentiality. [cite: 1114]"},
      {q:"Which is NOT a public key distribution means?",opts:["Public-Key Certificates","Hashing Certificates","Publicly available directories","Public-Key authority"],ans:1,exp:"'Hashing Certificates' is not a real distribution mechanism. [cite: 1116]"},

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const PAGE_SZ = 25;
let cur = Object.keys(subjects)[0];
let mode = 'quiz';
let filt = 'all';
let search = '';
let page = 0;
let ans = {};      // "subj_idx" → 'c'|'w'|'s'
let chosen = {};   // "subj_idx" → optionIndex
let order = {};    // per-subject index arrays (shuffled or sequential)
let fi = 0;        // flash index
let flipped = false;

// Init sequential order
Object.keys(subjects).forEach(s => {
  order[s] = subjects[s].questions.map((_,i)=>i);
});

// Try restore from localStorage
try {
  const saved = localStorage.getItem('examprep_v2');
  if (saved) { const d = JSON.parse(saved); ans = d.ans||{}; chosen = d.chosen||{}; }
} catch(e){}

function save() {
  try { localStorage.setItem('examprep_v2', JSON.stringify({ans,chosen})); } catch(e){}
}

function key(s,i){ return s+'__'+i; }

// ═══════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════
function getStats(s) {
  let c=0,w=0,tot=subjects[s].questions.length;
  subjects[s].questions.forEach((_,i)=>{
    const v=ans[key(s,i)];
    if(v==='c')c++; else if(v==='w')w++;
  });
  return {c,w,tot,done:c+w};
}

function updateHeader() {
  let tc=0,tw=0,tt=0;
  Object.keys(subjects).forEach(s=>{const st=getStats(s);tc+=st.c;tw+=st.w;tt+=st.tot;});
  document.getElementById('stT').textContent=tt;
  document.getElementById('stC').textContent=tc;
  document.getElementById('stW').textContent=tw;
  const d=tc+tw;
  document.getElementById('stS').textContent=d>0?Math.round(tc/d*100)+'%':'—';
}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function renderSidebar() {
  document.getElementById('sbjList').innerHTML = Object.keys(subjects).map(s => {
    const {c,w,tot,done}=getStats(s);
    const pct=tot>0?Math.round(done/tot*100):0;
    const col=subjects[s].color;
    return `<button class="sbj ${s===cur?'active':''}" onclick="pickSubj(${jsStr(s)})">
      <span class="dot" style="background:${col}"></span>
      <span class="lbl">${s}</span>
      <span class="cnt">${done}/${tot}</span>
      <span class="sbj-bar"><span class="sbj-bar-fill" style="width:${pct}%;background:${col}"></span></span>
    </button>`;
  }).join('');
}

function pickSubj(s) {
  cur=s; filt='all'; search=''; page=0; fi=0; flipped=false;
  closeSidebar(); renderSidebar(); renderMain();
}

// ═══════════════════════════════════════════════
// MOBILE SIDEBAR
// ═══════════════════════════════════════════════
function toggleSidebar() {
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sbOverlay');
  const open=sb.classList.toggle('open');
  ov.classList.toggle('show',open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('show');
}

// ═══════════════════════════════════════════════
// MODE
// ═══════════════════════════════════════════════
function setMode(m) {
  mode=m; fi=0; flipped=false; page=0;
  document.getElementById('mqz').classList.toggle('active',m==='quiz');
  document.getElementById('mfl').classList.toggle('active',m==='flash');
  renderMain();
}

function resetSubject() {
  if(!confirm(`Reset all answers for "${cur}"?`)) return;
  subjects[cur].questions.forEach((_,i)=>{delete ans[key(cur,i)];delete chosen[key(cur,i)];});
  save(); renderSidebar(); renderMain(); updateHeader();
}

// ═══════════════════════════════════════════════
// FILTERING
// ═══════════════════════════════════════════════
function filtered() {
  const qs=subjects[cur].questions;
  return order[cur].filter(i=>{
    const k=key(cur,i);
    const a=ans[k];
    if(filt==='un' && a) return false;
    if(filt==='w' && a!=='w') return false;
    if(filt==='c' && a!=='c') return false;
    if(search){
      const q=qs[i];
      return q.q.toLowerCase().includes(search)||q.opts.some(o=>o.toLowerCase().includes(search));
    }
    return true;
  });
}

function shuffle() {
  const a=order[cur];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  page=0; renderMain();
}

// ═══════════════════════════════════════════════
// QUIZ RENDER
// ═══════════════════════════════════════════════
function renderMain() {
  if(mode==='quiz') renderQuiz();
  else renderFlash();
}

function renderQuiz() {
  const {c,w,tot,done}=getStats(cur);
  const col=subjects[cur].color;
  const pct=tot>0?Math.round(done/tot*100):0;
  const idxs=filtered();
  const nPages=Math.ceil(idxs.length/PAGE_SZ);
  if(page>=nPages && page>0) page=Math.max(0,nPages-1);
  const pageIdxs=idxs.slice(page*PAGE_SZ,(page+1)*PAGE_SZ);
  const qs=subjects[cur].questions;

  const labels=['A','B','C','D'];

  let html=`
  <div class="sh">
    <div class="sh-name" style="color:${col}">${esc(cur)}</div>
    <div class="sh-prog">
      <div class="sh-lbl"><span>${done}/${tot} answered</span><span>${pct}%</span></div>
      <div class="sh-track"><div class="sh-fill" style="width:${pct}%"></div></div>
    </div>
  </div>
  <div class="ctrl">
    <input class="search" type="text" placeholder="Search…" value="${esc(search)}"
      oninput="search=this.value.toLowerCase();page=0;renderMain()">
    <button class="fbtn ${filt==='all'?'on':''}" onclick="setFilt('all')">ALL&nbsp;${tot}</button>
    <button class="fbtn ${filt==='un'?'on':''}" onclick="setFilt('un')">UNSEEN&nbsp;${tot-done}</button>
    <button class="fbtn wf ${filt==='w'?'on':''}" onclick="setFilt('w')">WRONG&nbsp;${w}</button>
    <button class="fbtn ${filt==='c'?'on':''}" onclick="setFilt('c')">CORRECT&nbsp;${c}</button>
    <button class="shuf" onclick="shuffle()">⇄ Shuffle</button>
  </div>`;

  if(idxs.length===0){
    html+=`<div class="empty"><div class="ico">🔍</div><p>No questions match this filter.</p></div>`;
  } else {
    pageIdxs.forEach(i=>{
      const q=qs[i];
      const k=key(cur,i);
      const a=ans[k];
      const ch=chosen[k];
      const isC=a==='c', isW=a==='w', shown=a==='s';
      html+=`<div class="qcard ${isC?'ac':isW?'aw':''}" id="qc${i}">
        <div class="qh"><span class="qn">Q${i+1}</span><div class="qt">${esc(q.q)}</div></div>
        <div class="opts" id="opts${i}">`;
      q.opts.forEach((opt,oi)=>{
        let cls='opt';
        if(a){
          if(oi===q.ans) cls='opt sc rc';
          else if(oi===ch && (isW||shown)) cls='opt sw';
        }
        html+=`<button class="${cls}" id="o${i}_${oi}" ${a?'disabled':''}
          onclick="doAns(${JSON.stringify(k)},${i},${oi},${q.ans})">
          <span class="ol">${labels[oi]}</span><span>${esc(opt)}</span>
        </button>`;
      });
      html+=`</div>`;
      if(a && q.exp) html+=`<div class="exp"><strong>${isC?'✓ Correct!':shown?'Revealed':'✗ Wrong'}</strong> — ${esc(q.exp)}</div>`;
      html+=`<div class="qf">
        <span class="qico">${isC?'✅':isW?'❌':''}</span>
        ${!a?`<button class="sabtn" onclick="reveal(${JSON.stringify(k)},${i},${q.ans})">Show Answer</button>`:''}
      </div></div>`;
    });

    if(nPages>1){
      html+=`<div class="pager">
        <button class="pgbtn" onclick="goPage(-1)" ${page===0?'disabled':''}>← Prev</button>
        <span class="pginfo">Page ${page+1} / ${nPages}</span>
        <button class="pgbtn" onclick="goPage(1)" ${page>=nPages-1?'disabled':''}>Next →</button>
      </div>`;
    }
  }

  document.getElementById('main').innerHTML=html;
}

function setFilt(f){filt=f;page=0;renderMain();}
function goPage(d){page+=d;renderMain();document.getElementById('main').scrollTop=0;}

function doAns(k,idx,sel,correct) {
  if(ans[k]) return;
  const isC=sel===correct;
  ans[k]=isC?'c':'w'; chosen[k]=sel; save();

  const card=document.getElementById('qc'+idx);
  if(!card) return;
  card.classList.toggle('ac',isC); card.classList.toggle('aw',!isC);

  const q=subjects[cur].questions[idx];
  q.opts.forEach((_,oi)=>{
    const b=document.getElementById('o'+idx+'_'+oi);
    if(!b) return;
    b.disabled=true;
    b.className=oi===correct?'opt sc rc':oi===sel?'opt sw':'opt';
  });

  const f=card.querySelector('.qf');
  f.querySelector('.qico').textContent=isC?'✅':'❌';
  f.querySelector('.sabtn')?.remove();

  if(q.exp){
    const d=document.createElement('div');
    d.className='exp';
    d.innerHTML=`<strong>${isC?'✓ Correct!':'✗ Wrong'}</strong> — ${esc(q.exp)}`;
    f.before(d);
  }
  updateHeader(); renderSidebar();
}

function reveal(k,idx,correct) {
  if(ans[k]) return;
  ans[k]='s'; chosen[k]=-1; save();
  const card=document.getElementById('qc'+idx);
  if(!card) return;
  const q=subjects[cur].questions[idx];
  q.opts.forEach((_,oi)=>{
    const b=document.getElementById('o'+idx+'_'+oi);
    if(!b) return;
    b.disabled=true;
    b.className=oi===correct?'opt rc':'opt';
  });
  const f=card.querySelector('.qf');
  f.querySelector('.sabtn')?.remove();
  if(q.exp){
    const d=document.createElement('div');
    d.className='exp';
    d.innerHTML=`<strong>Answer revealed</strong> — ${esc(q.exp)}`;
    f.before(d);
  }
}

// ═══════════════════════════════════════════════
// FLASH RENDER
// ═══════════════════════════════════════════════
function renderFlash() {
  const qs=subjects[cur].questions;
  const col=subjects[cur].color;
  const ord=order[cur];
  if(fi>=ord.length) fi=0;
  const ri=ord[fi];
  const q=qs[ri];
  const pct=Math.round((fi+1)/ord.length*100);

  document.getElementById('main').innerHTML=`
  <div class="sh">
    <div class="sh-name" style="color:${col}">${esc(cur)}</div>
  </div>
  <div class="flash-wrap">
    <div class="fc-prog">
      <div class="fc-pl"><span>Card ${fi+1} of ${ord.length}</span><span>${pct}%</span></div>
      <div class="fc-pt"><div class="fc-pf" style="width:${pct}%"></div></div>
    </div>
    <div class="fc ${flipped?'flip':''}" id="fc" onclick="doFlip()">
      <div class="fc-inner">
        <div class="fc-face fc-front">
          <div class="fc-lbl">Question ${ri+1}</div>
          <div class="fc-q">${esc(q.q)}</div>
          <div class="fc-tip">Click to reveal answer</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-lbl">Answer</div>
          <div class="fc-a">${esc(q.opts[q.ans])}</div>
          ${q.exp?`<div class="fc-exp">${esc(q.exp)}</div>`:''}
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fcnbtn" onclick="fcPrev()">← Prev</button>
      <span class="fc-ctr">${fi+1} / ${ord.length}</span>
      <button class="fcnbtn" onclick="fcNext()">Next →</button>
    </div>
    <div class="fc-keys">Space = flip &nbsp;·&nbsp; ← → = navigate &nbsp;·&nbsp; S = shuffle</div>
  </div>`;
}

function doFlip(){
  flipped=!flipped;
  const c=document.getElementById('fc');
  if(c) c.classList.toggle('flip',flipped);
}
function fcNext(){const l=order[cur].length;fi=(fi+1)%l;flipped=false;renderFlash();}
function fcPrev(){const l=order[cur].length;fi=(fi-1+l)%l;flipped=false;renderFlash();}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(mode==='flash'){
    if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();fcNext();}
    else if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();fcPrev();}
    else if(e.key===' '||e.key==='f'){e.preventDefault();doFlip();}
    else if(e.key==='s'||e.key==='S'){shuffle();}
  }
  if(e.key==='Escape') closeSidebar();
});

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function jsStr(s){return JSON.stringify(s);}

// ═══════════════════════════════════════════════
// TOUCH / SWIPE FOR MOBILE
// ═══════════════════════════════════════════════
let touchStartX = 0;
let touchEndX = 0;

document.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, {passive: true});

document.addEventListener('touchend', e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
}, {passive: true});

function handleSwipe() {
  const diff = touchEndX - touchStartX;
  if (Math.abs(diff) < 60) return; // ignore small accidental swipes

  const target = document.activeElement?.tagName;
  if(target === 'INPUT' || target === 'TEXTAREA') return;

  if (mode === 'flash') {
    if (diff < 0) fcNext(); // swipe left -> next
    else fcPrev();          // swipe right -> prev
  } else if (mode === 'quiz') {
    const idxs = filtered();
    const nPages = Math.ceil(idxs.length / PAGE_SZ);
    if (diff < 0 && page < nPages - 1) goPage(1);
    else if (diff > 0 && page > 0) goPage(-1);
  }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderSidebar();
renderMain();
updateHeader();
</script>
</body>
